<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5G-A 确定性网络智能调度平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --primary-bg: #0a1628; --card-bg: #0f1d35; --border: #1a3155;
            --accent: #33ff88; --accent-dim: rgba(51,255,136,0.15);
            --text: #e0e8f0; --text-dim: #8899aa; --danger: #ff4757;
            --warning: #ffa502; --info: #33b5ff; --radius: 10px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--primary-bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height: 100vh; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--primary-bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        .app-header { background: linear-gradient(135deg,#0a1628 0%,#0f1d35 50%,#1a3155 100%); border-bottom: 1px solid var(--border); padding: 12px 0; position: sticky; top: 0; z-index: 1000; }
        .app-header .logo-text { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg,var(--accent),#33b5ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .app-header .subtitle { font-size: .85rem; color: var(--text-dim); }
        .app-header .badge-status { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(51,255,136,0.3); border-radius: 20px; padding: 4px 14px; font-size: .8rem; }

        .sidebar { background: var(--card-bg); border-right: 1px solid var(--border); min-height: calc(100vh - 80px); padding: 0; }
        .sidebar .nav-item { width: 100%; }
        .sidebar .nav-link { color: var(--text-dim); padding: 14px 24px; border-left: 3px solid transparent; transition: all .2s; display: flex; align-items: center; gap: 12px; font-size: .95rem; cursor: pointer; }
        .sidebar .nav-link:hover { background: var(--accent-dim); color: var(--accent); }
        .sidebar .nav-link.active { background: var(--accent-dim); color: var(--accent); border-left-color: var(--accent); }
        .sidebar .nav-link i { font-size: 1.2rem; width: 24px; text-align: center; }

        .main-content { padding: 24px; min-height: calc(100vh - 80px); }
        .page-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .page-title i { color: var(--accent); }

        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; }
        .card-header { background: transparent; border-bottom: 1px solid var(--border); padding: 16px 20px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; }
        .card-body { padding: 20px; }

        .metric-card { background: linear-gradient(135deg, rgba(15,29,53,0.8), rgba(26,49,85,0.4)); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: all .3s; }
        .metric-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(51,255,136,0.1); }
        .metric-card .label { font-size: .8rem; color: var(--text-dim); margin-bottom: 6px; }
        .metric-card .value { font-size: 1.6rem; font-weight: 700; }
        .metric-card .value.green { color: var(--accent); }
        .metric-card .value.blue { color: var(--info); }
        .metric-card .value.yellow { color: var(--warning); }
        .metric-card .unit { font-size: .85rem; color: var(--text-dim); font-weight: 400; }
        .metric-card .change { font-size: .8rem; margin-top: 4px; }
        .metric-card .change.up { color: var(--accent); }
        .metric-card .change.down { color: var(--danger); }

        .chart-container { position: relative; height: 280px; width: 100%; }

        .btn-accent { background: var(--accent); color: #000; border: none; font-weight: 600; padding: 8px 20px; border-radius: 6px; transition: all .2s; }
        .btn-accent:hover { background: #2ae67a; color: #000; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(51,255,136,0.3); }
        .btn-outline-accent { background: transparent; color: var(--accent); border: 1px solid var(--accent); font-weight: 500; padding: 8px 20px; border-radius: 6px; transition: all .2s; }
        .btn-outline-accent:hover { background: var(--accent-dim); color: var(--accent); }
        .btn-outline-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
        .btn-outline-danger:hover { background: rgba(255,71,87,0.15); }

        .form-control, .form-select { background: var(--primary-bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; }
        .form-control:focus, .form-select:focus { background: var(--primary-bg); border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); color: var(--text); }
        .form-label { font-size: .85rem; color: var(--text-dim); margin-bottom: 4px; }

        .table { color: var(--text); margin: 0; }
        .table th { border-color: var(--border); color: var(--text-dim); font-weight: 500; font-size: .85rem; }
        .table td { border-color: var(--border); vertical-align: middle; }
        .table-hover tbody tr:hover { background: var(--accent-dim); }

        .badge-status-active { background: rgba(51,255,136,0.15); color: var(--accent); border: 1px solid rgba(51,255,136,0.3); padding: 4px 12px; border-radius: 20px; font-size: .8rem; }
        .badge-status-inactive { background: rgba(136,153,170,0.15); color: var(--text-dim); border: 1px solid rgba(136,153,170,0.3); padding: 4px 12px; border-radius: 20px; font-size: .8rem; }
        .badge-status-warning { background: rgba(255,165,2,0.15); color: var(--warning); border: 1px solid rgba(255,165,2,0.3); padding: 4px 12px; border-radius: 20px; font-size: .8rem; }
        .badge-status-danger { background: rgba(255,71,87,0.15); color: var(--danger); border: 1px solid rgba(255,71,87,0.3); padding: 4px 12px; border-radius: 20px; font-size: .8rem; }
        .badge-status-info { background: rgba(51,181,255,0.15); color: var(--info); border: 1px solid rgba(51,181,255,0.3); padding: 4px 12px; border-radius: 20px; font-size: .8rem; }

        .toast-container { position: fixed; top: 80px; right: 20px; z-index: 9999; }
        .custom-toast { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; animation: toastIn .3s ease-out; min-width: 280px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
        .custom-toast.success { border-left: 4px solid var(--accent); }
        .custom-toast.error { border-left: 4px solid var(--danger); }
        .custom-toast.info { border-left: 4px solid var(--info); }
        .custom-toast.warning { border-left: 4px solid var(--warning); }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(10,22,40,0.85); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .loading-overlay .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { color: var(--accent); margin-top: 16px; font-size: 1rem; }

        .modal-content { background: var(--card-bg); border: 1px solid var(--border); }
        .modal-header { border-bottom: 1px solid var(--border); }
        .modal-footer { border-top: 1px solid var(--border); }
        .btn-close { filter: invert(0.8) brightness(1.5); }

        .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
        .empty-state i { font-size: 3rem; margin-bottom: 16px; }

        .table-scroll { max-height: 350px; overflow-y: auto; }
        .table-scroll thead { position: sticky; top: 0; background: var(--card-bg); z-index: 2; }

        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .tag { display: inline-block; padding: 2px 10px; border-radius: 4px; font-size: .75rem; margin-right: 4px; }
        .tag-industrial { background: rgba(51,255,136,0.15); color: var(--accent); }
        .tag-vehicle { background: rgba(255,165,2,0.15); color: var(--warning); }
        .tag-civil { background: rgba(51,181,255,0.15); color: var(--info); }

        .comparison-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .comparison-row .bar { height: 24px; border-radius: 4px; transition: width .6s; }
        .comparison-row .bar.ai { background: var(--accent); }
        .comparison-row .bar.trad { background: var(--text-dim); opacity: 0.5; }

        .slide-down { animation: slideDown .3s ease-out; }
        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { min-height: auto; }
            .main-content { padding: 16px; }
            .metric-card .value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div id="loadingOverlay" class="loading-overlay" style="display:none">
    <div style="text-align:center"><div class="spinner"></div><p>数据处理中，请稍候...</p></div>
</div>
<div id="toastContainer" class="toast-container"></div>

<header class="app-header">
    <div class="container-fluid">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center gap-3">
                <div><span class="logo-text">5G-A</span><div class="subtitle">确定性网络智能调度平台</div></div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="badge-status" id="serverStatus"><span class="pulse-dot"></span>系统运行中</span>
                <span class="text-dim" style="font-size:.8rem" id="currentTime"></span>
            </div>
        </div>
    </div>
</header>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-0">
            <nav class="nav flex-column" style="padding-top:20px">
                <a class="nav-link active" data-page="dashboard" href="#"><i class="bi bi-speedometer2"></i>核心仪表盘</a>
                <a class="nav-link" data-page="slices" href="#"><i class="bi bi-layers"></i>切片管理</a>
                <a class="nav-link" data-page="sensing" href="#"><i class="bi bi-radar"></i>通感一体</a>
                <a class="nav-link" data-page="edge" href="#"><i class="bi bi-cpu"></i>边缘算力</a>
                <a class="nav-link" data-page="simulation" href="#"><i class="bi bi-play-circle"></i>仿真调度</a>
                <a class="nav-link" data-page="prediction" href="#"><i class="bi bi-graph-up"></i>性能预测</a>
                <a class="nav-link" data-page="ai" href="#"><i class="bi bi-brain"></i>AI分析</a>
            </nav>
        </div>

        <div class="col-md-10 main-content" id="mainContent"></div>
    </div>
</div>

<div class="modal fade" id="mainModal" tabindex="-1">
    <div class="modal-dialog"><div class="modal-content">
        <div class="modal-header"><h5 class="modal-title" id="modalTitle"></h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="modalBody"></div>
        <div class="modal-footer" id="modalFooter"></div>
    </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const API_BASE = '';

function showLoading(show) {
    document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none';
}

function toast(msg, type) {
    type = type || 'info';
    const c = document.getElementById('toastContainer');
    const t = document.createElement('div');
    t.className = 'custom-toast ' + type;
    const icons = {success:'bi-check-circle-fill',error:'bi-x-circle-fill',info:'bi-info-circle-fill',warning:'bi-exclamation-triangle-fill'};
    const colors = {success:'var(--accent)',error:'var(--danger)',info:'var(--info)',warning:'var(--warning)'};
    t.innerHTML = '<i class="bi ' + (icons[type]||icons.info) + '" style="color:' + (colors[type]||colors.info) + ';font-size:1.2rem"></i><span>' + msg + '</span>';
    c.appendChild(t);
    setTimeout(function() { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(function() { if(t.parentNode) t.remove(); }, 300); }, 3000);
}

async function api(url, options) {
    options = options || {};
    var headers = options.headers || {};
    if (!headers['Content-Type']) headers['Content-Type'] = 'application/json';
    var opts = { headers: headers, method: options.method || 'GET' };
    if (options.body && typeof options.body === 'object') opts.body = JSON.stringify(options.body);
    else if (options.body) opts.body = options.body;
    var resp = await fetch(API_BASE + url, opts);
    var data = await resp.json();
    if (!resp.ok && !data.success) throw new Error(data.message || '请求失败');
    return data;
}

function updateClock() {
    var now = new Date();
    document.getElementById('currentTime').textContent = now.toLocaleString('zh-CN');
}

var charts = {};

function destroyChart(id) {
    if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

// ============================================
// Navigation
// ============================================
async function navigate(page) {
    document.querySelectorAll('.sidebar .nav-link').forEach(function(a) { a.classList.remove('active'); });
    var link = document.querySelector('[data-page="' + page + '"]');
    if (link) link.classList.add('active');

    var main = document.getElementById('mainContent');
    main.innerHTML = '<div class="text-center text-dim" style="padding:80px"><div class="spinner" style="margin:0 auto 16px;width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite"></div>加载中...</div>';

    try {
        destroyChart('predictionChart');
        destroyChart('simulationChart');
        destroyChart('dashboardChart');
        var html = await pages[page].render();
        main.innerHTML = html;
        main.classList.add('slide-down');
        if (pages[page].after) await pages[page].after();
    } catch(e) {
        main.innerHTML = '<div class="empty-state"><i class="bi bi-exclamation-triangle" style="color:var(--danger)"></i><p>加载失败: ' + e.message + '</p><button class="btn btn-outline-accent" onclick="navigate(\'' + page + '\')">重试</button></div>';
    }
}

document.querySelectorAll('.sidebar .nav-link').forEach(function(a) {
    a.addEventListener('click', function(e) {
        e.preventDefault();
        navigate(this.dataset.page);
    });
});

// ============================================
// Pages
// ============================================
var pages = {};

// ---- Dashboard ----
pages.dashboard = {
    render: async function() {
        var data = await api('/api/dashboard/metrics');
        var d = data.data;
        return '<div class="page-title"><i class="bi bi-speedometer2"></i>核心仪表盘</div>' +
        '<div class="row mb-4">' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">空口峰值速率</div><div class="value green">' + d.network.air_peak_rate + '<span class="unit"> 下行</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">上行峰值速率</div><div class="value blue">' + d.network.uplink_peak_rate + '<span class="unit"> 上行</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">URLLC时延</div><div class="value green">' + d.network.urllc_latency + '<span class="unit"> 超低时延</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">车联网时延</div><div class="value yellow">' + d.network.v2x_latency + '<span class="unit"> 低时延</span></div></div></div>' +
        '</div>' +
        '<div class="row mb-4">' +
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">SLA履约率</div><div class="value green">' + d.network.sla_compliance + '<span class="unit"> 工业切片</span></div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">通感融合精度</div><div class="value blue">' + d.network.sensing_accuracy + '<span class="unit"> 环境感知</span></div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">网络可靠性</div><div class="value green">' + d.network.reliability + '<span class="unit"> 5个9标准</span></div></div></div>' +
        '</div>' +
        '<div class="row">' +
            '<div class="col-md-6 mb-3"><div class="card"><div class="card-header"><span>系统资源概览</span></div><div class="card-body"><div class="row">' +
                '<div class="col-4 text-center"><div class="metric-card"><div class="label">网络切片</div><div class="value blue">' + d.slices.active + '<span class="unit"> /' + d.slices.total + '</span></div><div class="change up">活跃</div></div></div>' +
                '<div class="col-4 text-center"><div class="metric-card"><div class="label">边缘节点</div><div class="value green">' + d.edge_nodes.online + '<span class="unit"> /' + d.edge_nodes.total + '</span></div><div class="change up">在线</div></div></div>' +
                '<div class="col-4 text-center"><div class="metric-card"><div class="label">告警事件</div><div class="value ' + (d.alerts>0?'yellow':'green') + '">' + d.alerts + '<span class="unit"> 条</span></div></div></div>' +
            '</div></div></div></div>' +
            '<div class="col-md-6 mb-3"><div class="card"><div class="card-header"><span>性能趋势 <small class="text-dim">(实时监控)</small></span></div><div class="card-body"><div class="chart-container"><canvas id="dashboardChart"></canvas></div></div></div></div>' +
        '</div>' +
        '<div class="text-end"><button class="btn btn-outline-accent btn-sm" onclick="refreshDashboard()"><i class="bi bi-arrow-clockwise"></i> 刷新数据</button></div>';
    },
    after: async function() {
        var labels = ['00:00','04:00','08:00','12:00','16:00','20:00','24:00'];
        var canvas = document.getElementById('dashboardChart');
        if (!canvas) return;
        var ctx = canvas.getContext('2d');
        charts.dashboardChart = new Chart(ctx, {
            type: 'line', data: {
                labels: labels,
                datasets: [
                    { label: '时延(ms)', data: labels.map(function(){return Math.random()*3+1}), borderColor: '#33ff88', backgroundColor:'rgba(51,255,136,0.1)', tension:.3, fill:true },
                    { label: '吞吐量(Gbps)', data: labels.map(function(){return Math.random()*2+8}), borderColor:'#33b5ff', backgroundColor:'rgba(51,181,255,0.1)', tension:.3, fill:true, yAxisID:'y1' }
                ]
            },
            options: {
                responsive:true, maintainAspectRatio:false,
                interaction:{mode:'index',intersect:false},
                scales:{ x:{ ticks:{color:'#8899aa'}, grid:{color:'rgba(26,49,85,0.3)'} }, y:{ position:'left', ticks:{color:'#8899aa'}, grid:{color:'rgba(26,49,85,0.3)'} }, y1:{ position:'right', ticks:{color:'#8899aa'}, grid:{display:false} } },
                plugins:{ legend:{ labels:{color:'#e0e8f0'} } }
            }
        });
    }
};

async function refreshDashboard() {
    showLoading(true);
    try { destroyChart('dashboardChart'); await navigate('dashboard'); } catch(e) { toast('刷新失败: '+e.message,'error'); }
    showLoading(false);
}

// ---- Slices ----
pages.slices = {
    render: async function() {
        var res = await api('/api/slices');
        var slices = res.data;
        var rows = slices.length ? slices.map(function(s) {
            return '<tr><td><input type="checkbox" class="form-check-input slice-check" value="' + s.id + '"></td>' +
                '<td>' + s.name + '</td>' +
                '<td><span class="tag tag-' + s.type + '">' + (s.type==='industrial'?'工业':s.type==='vehicle'?'车联网':'民生') + '</span></td>' +
                '<td>' + s.size + ' MB</td>' +
                '<td><span class="badge-status-' + (s.status==='active'?'active':'inactive') + '">' + (s.status==='active'?'活跃':'停用') + '</span></td>' +
                '<td>' + s.latency + ' ms / ' + s.bandwidth + ' Mbps</td>' +
                '<td>' + s.created_at + '</td>' +
                '<td><button class="btn btn-sm btn-outline-accent me-1" onclick="editSlice(' + s.id + ')"><i class="bi bi-pencil"></i></button>' +
                '<button class="btn btn-sm btn-outline-danger" onclick="deleteSlice(' + s.id + ')"><i class="bi bi-trash"></i></button></td></tr>';
        }).join('') : '<tr><td colspan="8" class="text-center text-dim">暂无切片数据</td></tr>';

        return '<div class="page-title"><i class="bi bi-layers"></i>网络切片管理</div>' +
        '<div class="d-flex justify-content-between align-items-center mb-3"><div class="d-flex gap-2">' +
            '<input class="form-control form-control-sm" id="sliceSearch" placeholder="搜索切片..." style="width:200px" onkeyup="searchSlices()">' +
            '<select class="form-select form-select-sm" id="sliceTypeFilter" style="width:130px" onchange="searchSlices()"><option value="">全部类型</option><option value="industrial">工业切片</option><option value="vehicle">车联网切片</option><option value="civil">民生切片</option></select>' +
            '<button class="btn btn-sm btn-outline-danger" onclick="batchDeleteSlices()"><i class="bi bi-trash"></i> 批量删除</button></div>' +
            '<button class="btn btn-accent btn-sm" onclick="showAddSliceModal()"><i class="bi bi-plus-lg"></i> 新增切片</button></div>' +
        '<div class="card"><div class="card-body p-0"><div class="table-scroll"><table class="table table-hover mb-0">' +
            '<thead><tr><th style="width:40px"><input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()"></th><th>名称</th><th>类型</th><th>带宽</th><th>状态</th><th>时延/带宽</th><th>创建时间</th><th style="width:100px">操作</th></tr></thead>' +

var editSliceId = null;
async function editSlice(id) {
    editSliceId = id;
    var res = await api('/api/slices');
    var s = res.data.find(function(x) { return x.id === id; });
    if (!s) return toast('切片不存在','error');
    document.getElementById('modalTitle').textContent = '编辑网络切片';
    document.getElementById('modalBody').innerHTML = '<form id="sliceForm"><div class="mb-3"><label class="form-label">切片名称</label><input class="form-control" id="f_name" value="' + s.name + '"></div>' +
        '<div class="mb-3"><label class="form-label">切片类型</label><select class="form-select" id="f_type"><option value="industrial" ' + (s.type==='industrial'?'selected':'') + '>工业切片</option><option value="vehicle" ' + (s.type==='vehicle'?'selected':'') + '>车联网切片</option><option value="civil" ' + (s.type==='civil'?'selected':'') + '>民生切片</option></select></div>' +
        '<div class="mb-3"><label class="form-label">带宽 (MB)</label><input class="form-control" id="f_size" type="number" value="' + s.size + '"></div>' +
        '<div class="mb-3"><label class="form-label">描述</label><textarea class="form-control" id="f_desc" rows="2">' + (s.description||'') + '</textarea></div>' +
        '<div class="mb-3"><label class="form-label">状态</label><select class="form-select" id="f_status"><option value="active" ' + (s.status==='active'?'selected':'') + '>活跃</option><option value="inactive" ' + (s.status==='inactive'?'selected':'') + '>停用</option></select></div></form>';
    document.getElementById('modalFooter').innerHTML = '<button class="btn btn-outline-accent" data-bs-dismiss="modal">取消</button><button class="btn btn-accent" onclick="submitSlice()">保存</button>';

}

async function submitSlice() {
    var data = { name: document.getElementById('f_name').value, type: document.getElementById('f_type').value, size: parseInt(document.getElementById('f_size').value), description: document.getElementById('f_desc').value };
    if (!data.name) return toast('请输入切片名称','warning');
    try {
        if (editSliceId) {
            if (document.getElementById('f_status')) data.status = document.getElementById('f_status').value;
            await api('/api/slices/' + editSliceId, { method:'PUT', body:data });
            toast('切片更新成功','success');
            editSliceId = null;
        } else { await api('/api/slices', { method:'POST', body:data }); toast('切片创建成功','success'); }
        bootstrap.Modal.getInstance(document.getElementById('mainModal')).hide();
        navigate('slices');
    } catch(e) { toast(e.message,'error'); }
}

async function deleteSlice(id) {
    if (!confirm('确定要删除此切片吗？')) return;
    try { await api('/api/slices/' + id, { method:'DELETE' }); toast('删除成功','success'); navigate('slices'); } catch(e) { toast(e.message,'error'); }
}

async function batchDeleteSlices() {
    var ids = [];
    document.querySelectorAll('.slice-check:checked').forEach(function(cb) { ids.push(parseInt(cb.value)); });
    if (!ids.length) return toast('请选择要删除的切片','warning');
    if (!confirm('确定要删除 ' + ids.length + ' 个切片吗？')) return;
    try { await api('/api/slices/batch-delete', { method:'POST', body:{ids:ids} }); toast('批量删除成功','success'); navigate('slices'); } catch(e) { toast(e.message,'error'); }
}

async function runSimulation() {
    showLoading(true);
    try {
        var scenario = document.getElementById('simScenario').value;
        var sliceType = document.getElementById('simSliceType').value;
        var res = await api('/api/simulation/run', { method:'POST', body:{scenario:scenario, slice_type:sliceType} });
        var d = res.data;

        var scenarioLabel = {low:'低负载',medium:'中负载',high:'高负载'};
        var sliceLabel = {industrial:'工业切片',vehicle:'车联网切片',civil:'民生切片'};

        var html = '<div class="card slide-down"><div class="card-header"><span>仿真结果 - ' + scenarioLabel[scenario] + ' / ' + sliceLabel[sliceType] + '</span></div><div class="card-body">' +
            '<div class="row mb-4">' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">AI优化时延</div><div class="value green">' + d.optimization_result.latency.ai_optimized + '<span class="unit"> ms</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">传统时延</div><div class="value yellow">' + d.optimization_result.latency.traditional + '<span class="unit"> ms</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">时延优化</div><div class="value green">' + d.optimization_result.latency.improvement_pct + '<span class="unit">%</span></div></div></div>' +
            '<div class="col-md-3 mb-3"><div class="metric-card"><div class="label">SLA履约率</div><div class="value blue">' + d.sla_compliance + '<span class="unit">%</span></div></div></div>' +
            '</div>';

        if (d.schedule && d.schedule.optimization_metrics) {
            var m = d.schedule.optimization_metrics;
            html += '<div class="row mb-4">' +
                '<div class="col-md-4"><div class="metric-card"><div class="label">负载均衡得分</div><div class="value green">' + m.balance_score + '</div></div></div>' +
                '<div class="col-md-4"><div class="metric-card"><div class="label">吞吐量提升</div><div class="value blue">' + m.throughput_improvement + '<span class="unit">%</span></div></div></div>' +
                '<div class="col-md-4"><div class="metric-card"><div class="label">时延缩减</div><div class="value green">' + m.latency_reduction + '<span class="unit">%</span></div></div></div>' +
                '</div>';
        }

        if (d.schedule && d.schedule.scheduled) {
            html += '<div class="card"><div class="card-header"><span>调度结果 (' + d.schedule.scheduled_count + '/' + d.schedule.total_tasks + ' 个任务已调度)</span></div>' +
                '<div class="card-body p-0"><div class="table-scroll"><table class="table table-hover mb-0"><thead><tr><th>任务</th><th>产线</th><th>优先级评分</th><th>预计耗时</th></tr></thead><tbody>' +
                d.schedule.scheduled.map(function(t) { return '<tr><td>' + t.task_name + '</td><td>' + t.line_name + '</td><td>' + t.priority_score + '</td><td>' + t.estimated_duration + 'h</td></tr>'; }).join('') +
                '</tbody></table></div></div></div>';
        }

        if (d.ai_report && d.ai_report.recommendations) {
            html += '<div class="card mt-3"><div class="card-header"><span>AI优化建议</span></div><div class="card-body"><ul class="mb-0">' +
                d.ai_report.recommendations.map(function(r) { return '<li class="mb-2">' + r + '</li>'; }).join('') + '</ul></div></div>';
        }

        html += '</div></div>';
        document.getElementById('simResult').innerHTML = html;
        toast('仿真完成! 时延优化 ' + d.optimization_result.latency.improvement_pct + '%','success');
        await loadSimHistory();
    } catch(e) { toast('仿真失败: '+e.message,'error'); }
    showLoading(false);
}

async function loadSimHistory() {
    try {
        var res = await api('/api/simulation/history');
        var scenarioLabel = {low:'低',medium:'中',high:'高'};
        var sliceLabel = {industrial:'工业',vehicle:'车联网',civil:'民生'};
        var tbody = document.getElementById('simHistoryBody');
        if (!tbody) return;
        tbody.innerHTML = res.data.length ? res.data.reverse().map(function(h) {
            var r = h.result;
            return '<tr><td>#' + h.id + '</td><td>' + (scenarioLabel[h.scenario]||h.scenario) + '负载</td>' +
                '<td>' + (sliceLabel[h.slice_type]||h.slice_type) + '</td>' +
                '<td><span class="badge-status-active">' + (r.optimization_result?r.optimization_result.latency.improvement_pct+'%':'--') + '</span></td>' +
                '<td>' + (r.sla_compliance||'--') + '%</td>' +
                '<td>' + h.timestamp + '</td></tr>';
        }).join('') : '<tr><td colspan="6" class="text-center text-dim">暂无仿真历史</td></tr>';
    } catch(e) {}
}

async function clearSimHistory() {
    if (!confirm('确定要清空所有仿真历史记录吗？')) return;
    try { await api('/api/simulation/history', { method:'DELETE' }); toast('历史记录已清空','success'); loadSimHistory(); } catch(e) { toast('清空失败: '+e.message,'error'); }
}

// ---- Prediction ----
pages.prediction = {
    render: async function() {
        return '<div class="page-title"><i class="bi bi-graph-up"></i>性能预测</div>' +
        '<div class="card mb-4"><div class="card-header"><span>预测参数</span></div><div class="card-body"><div class="row">' +
            '<div class="col-md-3 mb-3"><label class="form-label">预测时长</label><select class="form-select" id="predDuration"><option value="15">15分钟</option><option value="30" selected>30分钟</option><option value="60">60分钟</option></select></div>' +
            '<div class="col-md-3 mb-3"><label class="form-label">预测指标</label><select class="form-select" id="predMetric"><option value="latency">时延</option><option value="packet_loss">丢包率</option><option value="reliability">可靠性</option></select></div>' +
            '<div class="col-md-3 mb-3 d-flex align-items-end"><button class="btn btn-accent" onclick="runPrediction()"><i class="bi bi-graph-up"></i> 开始预测</button></div>' +
        '</div></div></div>' +
        '<div class="card"><div class="card-header"><span>预测结果对比</span></div><div class="card-body"><div class="chart-container" style="height:320px"><canvas id="predictionChart"></canvas></div></div></div>' +
        '<div id="predMetrics" class="row mt-3"></div>';
    },
    after: async function() { await runPrediction(); }
};

async function runPrediction() {
    showLoading(true);
    try {
        destroyChart('predictionChart');
        var duration = parseInt(document.getElementById('predDuration').value);
        var metric = document.getElementById('predMetric').value;
        var res = await api('/api/prediction/performance', { method:'POST', body:{duration:duration, metric:metric} });
        var d = res.data;

        var metricLabels = {latency:'时延 (ms)',packet_loss:'丢包率 (%)',reliability:'可靠性 (%)'};
        var canvas = document.getElementById('predictionChart');
        if (!canvas) { showLoading(false); return; }
        var ctx = canvas.getContext('2d');
        charts.predictionChart = new Chart(ctx, {
            type: 'line', data: {
                labels: d.labels,
                datasets: [
                    { label: '传统方式', data: d.traditional_data, borderColor:'#8899aa', backgroundColor:'rgba(136,153,170,0.1)', tension:.3, fill:true, borderDash:[5,5] },
                    { label: 'AI优化', data: d.ai_data, borderColor:'#33ff88', backgroundColor:'rgba(51,255,136,0.1)', tension:.3, fill:true }
                ]
            },
            options: {
                responsive:true, maintainAspectRatio:false,
                scales:{ x:{ ticks:{color:'#8899aa'}, grid:{color:'rgba(26,49,85,0.3)'} }, y:{ title:{display:true,text:metricLabels[metric]||metric,color:'#8899aa'}, ticks:{color:'#8899aa'}, grid:{color:'rgba(26,49,85,0.3)'} } },
                plugins:{ legend:{ labels:{color:'#e0e8f0',usePointStyle:true} }, tooltip:{mode:'index'} }
            }
        });

        document.getElementById('predMetrics').innerHTML =
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">性能提升</div><div class="value green">' + d.improvement_pct + '<span class="unit">%</span></div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">预测置信度</div><div class="value blue">' + d.confidence + '<span class="unit">%</span></div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card"><div class="label">预测指标</div><div class="value" style="color:var(--accent)">' + (metricLabels[metric]||metric) + '</div></div></div>';
        toast('预测完成! 性能提升 ' + d.improvement_pct + '%','success');
    } catch(e) { toast('预测失败: '+e.message,'error'); }
    showLoading(false);
}

// ---- AI Analysis ----
pages.ai = {
    render: async function() {
        return '<div class="page-title"><i class="bi bi-brain"></i>AI智能分析</div>' +
        '<div class="row mb-4">' +
            '<div class="col-md-4 mb-3"><div class="metric-card" style="cursor:pointer" onclick="runAIAnalysis(\'production\')"><div class="label"><i class="bi bi-gear"></i> 生产分析</div><div class="value green" style="font-size:1.2rem">生产调度优化</div><div class="text-dim mt-1">分析产线效率与资源分配</div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card" style="cursor:pointer" onclick="runAIAnalysis(\'risk\')"><div class="label"><i class="bi bi-shield-exclamation"></i> 风险评估</div><div class="value yellow" style="font-size:1.2rem">网络风险评估</div><div class="text-dim mt-1">识别潜在风险与异常</div></div></div>' +
            '<div class="col-md-4 mb-3"><div class="metric-card" style="cursor:pointer" onclick="runAIAnalysis(\'report\')"><div class="label"><i class="bi bi-file-earmark-text"></i> 优化报告</div><div class="value blue" style="font-size:1.2rem">综合优化报告</div><div class="text-dim mt-1">全局性能优化建议</div></div></div>' +
        '</div>' +
        '<div class="card"><div class="card-header"><span>AI服务状态</span><button class="btn btn-outline-accent btn-sm" onclick="checkAIStatus()"><i class="bi bi-arrow-clockwise"></i></button></div>' +
        '<div class="card-body"><div class="row" id="aiServiceStatus">' +
            '<div class="col-md-3"><div class="metric-card"><div class="label">调度算法</div><div class="value green" style="font-size:1rem">就绪</div></div></div>' +
            '<div class="col-md-3"><div class="metric-card"><div class="label">预测引擎</div><div class="value green" style="font-size:1rem">就绪</div></div></div>' +
            '<div class="col-md-3"><div class="metric-card"><div class="label">感知处理</div><div class="value green" style="font-size:1rem">就绪</div></div></div>' +
            '<div class="col-md-3"><div class="metric-card"><div class="label">DeepSeek API</div><div class="value" style="font-size:1rem;color:var(--warning)" id="dsStatus">检查中...</div></div></div>' +
        '</div></div></div>' +
        '<div id="aiResult"></div>';
    },
    after: async function() { await checkAIStatus(); }
};

async function checkAIStatus() {
    try {
        var res = await api('/api/ai/status');
        document.getElementById('dsStatus').textContent = res.data.deepseek_enabled ? '已连接' : '未配置';
        document.getElementById('dsStatus').style.color = res.data.deepseek_enabled ? 'var(--accent)' : 'var(--warning)';
    } catch(e) {}
}

async function runAIAnalysis(type) {
    showLoading(true);
    try {
        var res = await api('/api/ai/analyze', { method:'POST', body:{type:type} });
        var d = res.data;

        var html = '<div class="card slide-down mt-3"><div class="card-header"><span>分析结果</span></div><div class="card-body">';

        if (d.data_summary) {
            html += '<div class="row mb-3"><div class="col-md-4"><div class="metric-card"><div class="label">活跃产线</div><div class="value blue">' + d.data_summary.active_lines + '</div></div></div>' +
                '<div class="col-md-4"><div class="metric-card"><div class="label">总任务数</div><div class="value green">' + d.data_summary.total_tasks + '</div></div></div>' +
                '<div class="col-md-4"><div class="metric-card"><div class="label">调度率</div><div class="value green">' + d.data_summary.scheduled_rate + '<span class="unit">%</span></div></div></div></div>';
        }

        if (d.risks) {
            html += '<div class="mb-3"><strong>风险等级: </strong><span class="badge-status-' + (d.overall_level==='info'?'active':d.overall_level==='warning'?'warning':'danger') + '">' + (d.overall_level==='info'?'正常':d.overall_level==='warning'?'警告':'严重') + '</span></div>';
            html += d.risks.map(function(r) {
                return '<div class="alert alert-' + (r.level==='info'?'success':r.level==='warning'?'warning':'danger') + ' bg-transparent border-' + (r.level==='info'?'success':r.level==='warning'?'warning':'danger') + ' mb-2"><strong>' + r.type + '</strong>: ' + r.detail + '<br><small>' + r.suggestion + '</small></div>';
            }).join('');
        }

        if (d.metrics) {
            html += '<div class="row mb-3">';
            for (var k in d.metrics) {
                var labels = {latency_improvement:'时延优化',throughput_improvement:'吞吐量提升',energy_saving:'节能',cost_reduction:'成本降低',quality_improvement:'质量提升'};
                html += '<div class="col-md-4 mb-2"><div class="metric-card"><div class="label">' + (labels[k]||k) + '</div><div class="value green" style="font-size:1.2rem">' + d.metrics[k] + '</div></div></div>';
            }
            html += '</div>';
        }

        if (d.ai_recommendations || d.recommendations) {
            var recs = d.ai_recommendations || d.recommendations;
            html += '<div class="mt-3"><strong>AI建议:</strong><ul class="mt-2">' + recs.map(function(r) { return '<li class="mb-2">' + r + '</li>'; }).join('') + '</ul></div>';
        }

        if (d.deepseek_analysis) {
            html += '<div class="mt-3 p-3" style="background:rgba(51,255,136,0.05);border-radius:8px;border-left:3px solid var(--accent)"><strong>DeepSeek分析:</strong><p class="mt-2 mb-0">' + d.deepseek_analysis + '</p></div>';
        }

        html += '</div></div>';
        document.getElementById('aiResult').innerHTML = html;
        toast('AI分析完成','success');
    } catch(e) { toast('分析失败: '+e.message,'error'); }
    showLoading(false);
}
